apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: wildfire-ops
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ["alertname", "severity"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: "default"
      routes:
        - match:
            severity: critical
          receiver: "critical"
          group_wait: 10s
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: "warning"

    receivers:
      - name: "default"
        webhook_configs:
          - url: "http://apigw:8000/webhooks/alerts"
            send_resolved: true

      - name: "critical"
        # Uncomment and configure for production
        # pagerduty_configs:
        #   - service_key: CHANGE_ME
        #     severity: critical
        # slack_configs:
        #   - api_url: CHANGE_ME
        #     channel: "#wildfire-critical"
        #     title: "🔥 CRITICAL: {{ .GroupLabels.alertname }}"
        #     text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
        webhook_configs:
          - url: "http://apigw:8000/webhooks/alerts"
            send_resolved: true

      - name: "warning"
        webhook_configs:
          - url: "http://apigw:8000/webhooks/alerts"
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ["alertname"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: wildfire-ops
  labels:
    app: alertmanager
    tier: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        tier: monitoring
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.26.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: data
              mountPath: /alertmanager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: wildfire-ops
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
