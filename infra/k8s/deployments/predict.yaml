apiVersion: apps/v1
kind: Deployment
metadata:
  name: predict
  namespace: wildfire-ops
  labels:
    app: wildfire-predict
    tier: compute
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wildfire-predict
  template:
    metadata:
      labels:
        app: wildfire-predict
        tier: compute
    spec:
      serviceAccountName: wildfire-ops-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: predict
          image: ghcr.io/bigmt/wildfire-predict:latest
          ports:
            - containerPort: 8102
          envFrom:
            - configMapRef:
                name: wildfire-config
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8102
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8102
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: predict
  namespace: wildfire-ops
spec:
  selector:
    app: wildfire-predict
  ports:
    - port: 8102
      targetPort: 8102
