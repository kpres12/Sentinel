apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: wildfire-ops
  labels:
    app: wildfire-console
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wildfire-console
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: wildfire-console
        tier: frontend
    spec:
      serviceAccountName: wildfire-ops-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: console
          image: ghcr.io/bigmt/wildfire-console:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: wildfire-config
            - secretRef:
                name: wildfire-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: console
  namespace: wildfire-ops
  labels:
    app: wildfire-console
spec:
  selector:
    app: wildfire-console
  ports:
    - name: http
      port: 3000
      targetPort: 3000
