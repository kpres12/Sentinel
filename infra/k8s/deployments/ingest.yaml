apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: wildfire-ops
  labels:
    app: wildfire-ingest
    tier: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wildfire-ingest
  template:
    metadata:
      labels:
        app: wildfire-ingest
        tier: data
    spec:
      serviceAccountName: wildfire-ops-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ingest
          image: ghcr.io/bigmt/wildfire-ingest:latest
          ports:
            - containerPort: 8103
          envFrom:
            - configMapRef:
                name: wildfire-config
            - secretRef:
                name: wildfire-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8103
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8103
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: wildfire-ops
spec:
  selector:
    app: wildfire-ingest
  ports:
    - port: 8103
      targetPort: 8103
