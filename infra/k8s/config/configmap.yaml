apiVersion: v1
kind: ConfigMap
metadata:
  name: wildfire-config
  namespace: wildfire-ops
  labels:
    app.kubernetes.io/part-of: wildfire-ops
data:
  # Database
  POSTGRES_DB: wildfire_ops
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  # Redis
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  # MQTT
  MQTT_BROKER: emqx
  MQTT_PORT: "1883"
  # Service URLs (internal cluster DNS)
  API_GATEWAY_URL: "http://apigw:8000"
  TRIANGULATE_URL: "http://triangulate:8101"
  PREDICT_URL: "http://predict:8102"
  INGEST_URL: "http://ingest:8103"
  SUMMIT_INTEGRATION_URL: "http://summit-integration:8001"
  KEYCLOAK_URL: "http://keycloak:8080"
  # Console public URLs (overridden per environment)
  NEXT_PUBLIC_API_URL: "https://api.wildfire-ops.com"
  NEXT_PUBLIC_MQTT_WS_URL: "wss://mqtt.wildfire-ops.com/mqtt"
  # Keycloak OIDC
  KEYCLOAK_REALM: wildfire-ops
  KEYCLOAK_CLIENT_ID: wildfire-console
  # Operational
  LOG_LEVEL: info
  NODE_ENV: production
  TZ: UTC
