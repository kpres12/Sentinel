# IMPORTANT: Do NOT commit real secrets. Use ExternalSecrets or sealed-secrets in production.
# This template shows the required keys. Replace CHANGE_ME values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: wildfire-secrets
  namespace: wildfire-ops
  labels:
    app.kubernetes.io/part-of: wildfire-ops
type: Opaque
stringData:
  # Database
  POSTGRES_USER: CHANGE_ME
  POSTGRES_PASSWORD: CHANGE_ME
  DATABASE_URL: postgresql://CHANGE_ME:CHANGE_ME@postgres:5432/wildfire_ops
  # Redis
  REDIS_PASSWORD: CHANGE_ME
  # MQTT
  EMQX_USERNAME: CHANGE_ME
  EMQX_PASSWORD: CHANGE_ME
  # API security
  SECRET_KEY: CHANGE_ME
  JWT_SECRET: CHANGE_ME
  # Keycloak
  KEYCLOAK_ADMIN_PASSWORD: CHANGE_ME
  KEYCLOAK_CLIENT_SECRET: CHANGE_ME
  # External APIs
  FIRMS_MAP_KEY: CHANGE_ME
  NOAA_API_TOKEN: CHANGE_ME
  SUMMIT_API_KEY: CHANGE_ME
---
