apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: wildfire-ops
  labels:
    app: wildfire-keycloak
    tier: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wildfire-keycloak
  template:
    metadata:
      labels:
        app: wildfire-keycloak
        tier: auth
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:23.0
          args: ["start", "--db=postgres", "--hostname-strict=false", "--http-enabled=true"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wildfire-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres:5432/keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wildfire-secrets
                  key: POSTGRES_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wildfire-secrets
                  key: POSTGRES_PASSWORD
            - name: KC_PROXY
              value: edge
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: wildfire-ops
spec:
  selector:
    app: wildfire-keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
